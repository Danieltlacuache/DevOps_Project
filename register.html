<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gestión de Condominios</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-box { background: #f4f4f4; padding: 15px; border-radius: 5px; margin-top: 15px; border: 1px dashed #ccc; }
        .message { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; }
        .error { display: block; background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .success { display: block; background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Crear Cuenta</h1>
        <p>Regístrate para comenzar a gestionar tu condominio.</p>

        <form id="register-form">
            <div class="form-group">
                <label for="register-email">Email:</label>
                <input type="email" id="register-email" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="form-group">
                <label for="register-password">Contraseña (mín. 6 caracteres):</label>
                <input type="password" id="register-password" minlength="6" required>
            </div>

            <div class="admin-box">
                <label for="admin-key" style="font-weight: bold; display: block; margin-bottom: 5px;">¿Eres Administrador?</label>
                <input type="password" id="admin-key" placeholder="Llave Maestra">
                <small style="color: #666;">Deja vacío si eres un residente normal.</small>
            </div>

            <button type="submit" class="btn" style="margin-top: 20px; width: 100%;">Registrarse</button>
        </form>

        <div id="message" class="message"></div>

        <p style="margin-top: 20px;">
            ¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a>
        </p>
    </div>

    <script src="register.js"></script>
</body>
</html>
