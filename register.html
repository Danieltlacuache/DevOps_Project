<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - CondoManager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Crear Cuenta</h1>
        <p>Únete a la gestión inteligente de condominios.</p>

        <form id="register-form">
            <div class="form-group">
                <label for="register-email">Email:</label>
                <input type="email" id="register-email" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="form-group">
                <label for="register-password">Contraseña (mín. 6 caracteres):</label>
                <input type="password" id="register-password" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="register-password-confirm">Confirmar Contraseña:</label>
                <input type="password" id="register-password-confirm" minlength="6" required>
            </div>

            <div class="admin-box">
                <label for="admin-key" style="font-weight: bold; display: block; margin-bottom: 5px;">¿Eres Administrador?</label>
                <input type="password" id="admin-key" placeholder="Llave Maestra o Token">
                <small style="color: #64748b; font-size: 0.8rem; margin-top: 5px; display: block;">
                    Deja vacío si eres un residente normal.
                </small>
            </div>

            <button type="submit" class="btn" style="margin-top: 20px; width: 100%;">Registrarse</button>
        </form>

        <div id="message" class="message"></div>

        <p class="register-link">
            ¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a>
        </p>
    </div>

    <script src="register.js"></script>
</body>
</html>
