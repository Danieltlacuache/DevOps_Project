AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Proyecto Final CondoManager Pro - Sistema Escalable de Gestión de Condominios

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.10
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        RESIDENTS_TABLE: !Ref ResidentsTable
        ADMINS_DATA_TABLE: !Ref AdminsTable
        CONDOS_TABLE: !Ref CondosTable
        ADMIN_TOKENS_TABLE: !Ref AdminTokensTable
        PHOTOS_BUCKET: !Ref CondoPhotosBucket

Resources:
  # ==============================================================================
  # 1. FUNCIÓN LAMBDA PRINCIPAL
  # ==============================================================================
  CondoManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Events:
        CondoApi:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ResidentsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AdminsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref CondosTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AdminTokensTable }
        - S3CrudPolicy: { BucketName: !Ref CondoPhotosBucket }

  # ==============================================================================
  # 2. ALMACENAMIENTO DE IMÁGENES (S3)
  # ==============================================================================
  CondoPhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "condo-manager-photos-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: ['*']
            ExposedHeaders: ['ETag']

  # Política para que las fotos sean visibles en la web
  CondoPhotosBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CondoPhotosBucket
      PolicyDocument:
        Statement:
          - Action: ['s3:GetObject']
            Effect: Allow
            Resource: !Sub "arn:aws:s3:::${CondoPhotosBucket}/*"
            Principal: "*"

  # ==============================================================================
  # 3. BASES DE DATOS (DYNAMODB)
  # ==============================================================================
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Users
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ResidentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Residents
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  AdminsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Administradores
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  CondosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Condominios
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  AdminTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AdminTokens
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

# ==============================================================================
# 4. SALIDAS (OUTPUTS)
# ==============================================================================
Outputs:
  ApiUrl:
    Description: "URL de la API para configurar en tus archivos JS"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"