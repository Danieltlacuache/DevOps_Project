AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CondoManager Pro

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.10
    Tracing: Active
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        RESIDENTS_TABLE: !Ref ResidentsTable
        CONDOS_TABLE: !Ref CondosTable
        UNITS_TABLE: !Ref UnitsTable
        ADMIN_TOKENS_TABLE: !Ref AdminTokensTable
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        MAINTENANCE_TASKS_TABLE: !Ref MaintenanceTasksTable
        ANNOUNCEMENTS_TABLE: !Ref AnnouncementsTable
        INCIDENTS_TABLE: !Ref IncidentsTable
        FEES_TABLE: !Ref FeesTable
        # --- AQUI ESTAN LAS VARIABLES NUEVAS DE AMENIDADES ---
        AMENITIES_TABLE: !Ref AmenitiesTable
        AMENITY_RESERVATIONS_TABLE: !Ref AmenityReservationsTable
        # -----------------------------------------------------
        PHOTOS_BUCKET: !Ref CondoPhotosBucket
        SECRET_ID: "CondoManager/JWT_Secret"
        WEBSOCKET_URL: !Sub "https://${CondoWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
        CDN_DOMAIN: !GetAtt CondoCloudFrontDistribution.DomainName

Resources:
  # ==============================================================================
  # 1. API GATEWAY (REST)
  # ==============================================================================
  CondoRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      TracingEnabled: true
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  # ==============================================================================
  # 2. FUNCIÓN LAMBDA (SERVERLESS BACKEND)
  # ==============================================================================
  CondoManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - AmazonDynamoDBFullAccess
        - AmazonS3FullAccess
        - SecretsManagerReadWrite
        - AmazonAPIGatewayInvokeFullAccess
        - "arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess"
      Events:
        CondoApi:
          Type: Api
          Properties:
            RestApiId: !Ref CondoRestApi
            Path: /{proxy+}
            Method: ANY

  # ==============================================================================
  # 3. TABLAS DYNAMODB
  # ==============================================================================
  UsersTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: email, Type: String } } }
  ResidentsTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: id, Type: String } } }
  UnitsTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: id, Type: String } } }
  AdminTokensTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: token, Type: String } } }
  ConnectionsTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: connectionId, Type: String } } }
  MaintenanceTasksTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: id, Type: String } } }
  AnnouncementsTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: id, Type: String } } }
  IncidentsTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: id, Type: String } } }
  FeesTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: id, Type: String } } }
  
  # --- AQUÍ ESTÁN LAS TABLAS NUEVAS DE AMENIDADES ---
  AmenitiesTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: id, Type: String } } }
  AmenityReservationsTable: { Type: AWS::Serverless::SimpleTable, Properties: { PrimaryKey: { Name: id, Type: String } } }
  # --------------------------------------------------

  CondosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions: [{AttributeName: id, AttributeType: S}, {AttributeName: popularidad, AttributeType: N}]
      KeySchema: [{AttributeName: id, KeyType: HASH}]
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: PopularityIndex
          KeySchema: [{AttributeName: popularidad, KeyType: HASH}]
          Projection: {ProjectionType: ALL}

  # ==============================================================================
  # 4. S3 Y CLOUDFRONT (CDN)
  # ==============================================================================
  CondoPhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules: [{ AllowedHeaders: ['*'], AllowedMethods: [GET, PUT, POST, DELETE], AllowedOrigins: ['*'] }]

  # Política que hace público el bucket automáticamente al desplegar
  CondoPhotosBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CondoPhotosBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::${CondoPhotosBucket}/*"

  CondoCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - DomainName: !GetAtt CondoPhotosBucket.DomainName
            Id: S3Origin
            S3OriginConfig: { OriginAccessIdentity: "" }
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          ForwardedValues: { QueryString: false, Cookies: { Forward: none } }

  # ==============================================================================
  # 5. WEBSOCKETS (TIEMPO REAL)
  # ==============================================================================
  CondoWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties: { Name: CondoWebSocketApi, ProtocolType: WEBSOCKET, RouteSelectionExpression: "$request.body.action" }

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref CondoWebSocketApi, RouteKey: $connect, Target: !Join [ '/', [ 'integrations', !Ref WebSocketIntegration ] ] }

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref CondoWebSocketApi, RouteKey: $disconnect, Target: !Join [ '/', [ 'integrations', !Ref WebSocketIntegration ] ] }

  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref CondoWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CondoManagerFunction.Arn}/invocations"

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn: [ConnectRoute, DisconnectRoute]
    Properties: { ApiId: !Ref CondoWebSocketApi }

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties: { StageName: Prod, DeploymentId: !Ref WebSocketDeployment, ApiId: !Ref CondoWebSocketApi }

  CondoFunctionWSAllow:
    Type: AWS::Lambda::Permission
    Properties: { Action: lambda:InvokeFunction, FunctionName: !Ref CondoManagerFunction, Principal: apigateway.amazonaws.com }

Outputs:
  ApiUrl: { Value: !Sub "https://${CondoRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/" }
  WebSocketUrl: { Value: !Sub "wss://${CondoWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/Prod" }
  CDNUrl: { Value: !GetAtt CondoCloudFrontDistribution.DomainName }