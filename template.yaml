AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CondoManager Pro - Gestion de Condominios en AWS

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.10
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        RESIDENTS_TABLE: !Ref ResidentsTable
        CONDOS_TABLE: !Ref CondosTable
        UNITS_TABLE: !Ref UnitsTable
        ADMIN_TOKENS_TABLE: !Ref AdminTokensTable
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        PHOTOS_BUCKET: !Ref CondoPhotosBucket
        SECRET_ID: "CondoManager/JWT_Secret"
        WEBSOCKET_URL: !Sub "https://${CondoWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

Resources:
  # ==============================================================================
  # 1. FUNCIÓN LAMBDA (PROCESADOR CENTRAL)
  # ==============================================================================
  CondoManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Events:
        # Proxy Any permite que la Lambda maneje todas las rutas (/config, /condos, etc.)
        CondoApi:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ResidentsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref CondosTable }
        - DynamoDBCrudPolicy: { TableName: !Ref UnitsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref AdminTokensTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConnectionsTable }
        - S3CrudPolicy: { BucketName: !Ref CondoPhotosBucket }
        # Política para leer el secreto del JWT
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:CondoManager/JWT_Secret-*"
        # Permiso para enviar mensajes push vía WebSockets
        - Statement:
            - Effect: Allow
              Action:
                - 'execute-api:ManageConnections'
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CondoWebSocketApi}/*'

  # ==============================================================================
  # 2. API GATEWAY WEBSOCKET (TIEMPO REAL)
  # ==============================================================================
  CondoWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: CondoWebSocketApi
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CondoWebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Join [ '/', [ 'integrations', !Ref WebSocketIntegration ] ]

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CondoWebSocketApi
      RouteKey: $disconnect
      Target: !Join [ '/', [ 'integrations', !Ref WebSocketIntegration ] ]

  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref CondoWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CondoManagerFunction.Arn}/invocations"

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn: [ConnectRoute, DisconnectRoute]
    Properties:
      ApiId: !Ref CondoWebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: Prod
      DeploymentId: !Ref WebSocketDeployment
      ApiId: !Ref CondoWebSocketApi

  CondoFunctionWSAllow:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CondoManagerFunction
      Principal: apigateway.amazonaws.com

  # ==============================================================================
  # 3. BASES DE DATOS (DYNAMODB)
  # ==============================================================================
  UsersTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: email, Type: String }

  ResidentsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: id, Type: String }

  CondosTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: id, Type: String }

  UnitsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: id, Type: String }

  AdminTokensTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: token, Type: String }

  ConnectionsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: connectionId, Type: String }

  # ==============================================================================
  # 4. ALMACENAMIENTO (S3)
  # ==============================================================================
  CondoPhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE]
            AllowedOrigins: ['*']

  CondoPhotosBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CondoPhotosBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${CondoPhotosBucket}/*'
            Principal: '*'

# ==============================================================================
# 5. SALIDAS (URLS PARA EL FRONTEND)
# ==============================================================================
Outputs:
  ApiUrl:
    Description: "URL de la API REST"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  WebSocketUrl:
    Description: "URL del WebSocket"
    Value: !Sub "wss://${CondoWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"