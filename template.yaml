AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sistema Gestión Condominios - ITESO 2026.

Globals:
  Function:
    Timeout: 30
    Runtime: python3.10
    MemorySize: 512
    Environment:
      Variables:
        PHOTOS_BUCKET: !Ref CondoPhotosBucket
        USERS_TABLE: Users
        RESIDENTS_TABLE: Residents
        CONDOS_TABLE: Condominios
        ADMIN_TOKENS_TABLE: AdminTokens
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"

Resources:
  UsersTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: email, Type: String }
      TableName: Users
  ResidentsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: id, Type: String }
      TableName: Residents
  CondosTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: id, Type: String }
      TableName: Condominios
  AdminTokensTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey: { Name: token, Type: String }
      TableName: AdminTokens

  CondoPhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "condo-manager-photos-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3000

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CondoPhotosBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${CondoPhotosBucket}/*'
            Principal: '*'

  CondoManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Policies:
        - DynamoDBCrudPolicy: { TableName: Users }
        - DynamoDBCrudPolicy: { TableName: Residents }
        - DynamoDBCrudPolicy: { TableName: Condominios }
        - DynamoDBCrudPolicy: { TableName: AdminTokens }
        - S3CrudPolicy: { BucketName: !Sub "condo-manager-photos-${AWS::AccountId}" }
        - Statement:
            - Effect: Allow
              Action: 'secretsmanager:GetSecretValue'
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:jwt-secret-key-*"
      Events:
        MainApi:
          Type: Api
          Properties: { Path: "/{proxy+}", Method: any }

Outputs:
  ApiUrl:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"