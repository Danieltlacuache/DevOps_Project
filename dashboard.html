<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CondoManager Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="container nav-glass">
            <div class="logo">🏢 CondoManager<span>Pro</span></div>
            <div class="user-info">
                <span id="user-email" class="badge-email">cargando...</span>
                <button onclick="logout()" class="btn-logout">Cerrar Sesión</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <div id="super-user-controls" style="display: none; margin-bottom: 25px;">
            <section class="card master-card" style="background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%); color: white; padding: 20px; border-radius: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3 style="color: white; margin: 0;">👑 Panel Maestro</h3>
                        <p style="color: #e2e8f0; margin: 5px 0 0 0;">Genera invitaciones para nuevos administradores.</p>
                    </div>
                    <button onclick="createInviteToken()" class="btn-primary" style="width: auto; background: white; color: #6d28d9; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">Generar Token</button>
                </div>
            </section>
        </div>

        <section id="admin-section" style="display: none;">
            <div class="bento-grid" style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
                <div class="card">
                    <h3>🏢 Registrar Edificio</h3>
                    <form id="add-condo-form">
                        <div class="input-group">
                            <label>Nombre del Condominio</label>
                            <input type="text" id="condo-nombre" placeholder="Ej. Torre Altura" required>
                        </div>
                        <div class="input-group" style="margin-top: 15px;">
                            <label>Dirección</label>
                            <input type="text" id="condo-direccion" placeholder="Calle y número" required>
                        </div>
                        <div class="file-area" style="margin-top: 15px;">
                            <input type="file" id="condo-file" accept="image/*" style="display: none;">
                            <label for="condo-file" class="file-label" style="display: block; padding: 20px; border: 2px dashed #6d28d9; text-align: center; cursor: pointer; border-radius: 12px; background: #f8fafc;">📸 Seleccionar Foto</label>
                        </div>
                        <img id="preview" src="" style="display:none; width:100%; border-radius:12px; margin-top:15px; height: 180px; object-fit: cover; border: 1px solid #e2e8f0;">
                        
                        <button type="submit" class="btn-primary" style="margin-top: 20px; width: 100%;">Guardar Condominio</button>
                    </form>
                </div>

                <div class="card">
                    <h3>📋 Gestión de Inventario</h3>
                    <div id="condos-list-admin" class="grid-layout"></div>
                </div>
            </div>
        </section>

        <section id="residente-section" style="display: none;">
            <div class="tabs-nav" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="tab-market" class="tab-btn active" onclick="switchTab('market')">🛒 Marketplace</button>
                <button id="tab-reservas" class="tab-btn" onclick="switchTab('reservas')">🔑 Mis Reservas</button>
            </div>
            
            <div id="view-market" class="card">
                <h3>Edificios Disponibles</h3>
                <div id="available-grid" class="grid-layout" style="margin-top: 20px;"></div>
            </div>

            <div id="view-reservas" class="card" style="display: none;">
                <h3>Tu Residencia Actual</h3>
                <div id="my-reservas-grid" class="grid-layout" style="margin-top: 20px;"></div>
            </div>
        </section>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
